name: 신용보증재단 보증상품 캐시 갱신

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 10:00 KST (UTC 01:00) - gov24 09:30 직후
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 의존성 설치
        run: npm install

      - name: 신보재단 크롤링 (대구·경북 동적 + 서울·경기 정적)
        run: node crawl-shinbo.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shinbo-data.json
          git diff --staged --quiet || git commit -m "신보재단 보증상품 자동 업데이트 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
